name: Build KSO-HANI V34.FINAL16 ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin syslinux-utils mtools

      - name: Build base system with debootstrap
        run: |
          sudo debootstrap --arch=amd64 noble rootfs http://archive.ubuntu.com/ubuntu/

      - name: Install packages inside chroot
        run: |
          sudo chroot rootfs /bin/bash -c "
          apt-get update -y && \
          apt-get install -y software-properties-common && \
          add-apt-repository universe multiverse -y && \
          apt-get update -y && \
          apt-get install -y --no-install-recommends \
          linux-generic \
          i3 \
          gnome-games \
          minetest \
          network-manager \
          xinit \
          xserver-xorg \
          initramfs-tools \
          sudo \
          bash \
          coreutils \
          fonts-noto-core \
          xterm
          "

      - name: Setup autologin + i3 + اسمكم
        run: |
          sudo mkdir -p rootfs/etc/systemd/system/getty@tty1.service.d/
          echo '[Service]
          ExecStart=
          ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM' | sudo tee rootfs/etc/systemd/system/getty@tty1.service.d/autologin.conf > /dev/null

          echo 'if [ -z "$DISPLAY" ] && [ "$(tty)" = "/dev/tty1" ]; then
            exec startx
          fi' | sudo tee rootfs/root/.bash_profile > /dev/null

          sudo mkdir -p rootfs/etc/skel/.config/i3/
          echo '# KSO-HANI V34.FINAL16 - مشروع [KSO]
          # برمجة عبد الله و عبد الرحمن هاني
          set $mod Mod4
          font pango:Noto Sans 10
          bindsym $mod+Return exec --no-startup-id xterm
          bindsym $mod+g exec --no-startup-id gnome-games
          bindsym $mod+m exec --no-startup-id minetest
          bindsym $mod+q exec --no-startup-id shutdown -h now' | sudo tee rootfs/etc/skel/.config/i3/config > /dev/null

          echo 'echo "========================================="
          echo " برمجة عبد الله و عبد الرحمن هاني [KSO]"
          echo " KSO-HANI V34.FINAL16" 
          echo "========================================="' | sudo tee -a rootfs/etc/skel/.bashrc > /dev/null

      - name: Create ISO - اسمكم في قايمة البوت GRUB
        run: |
          sudo mksquashfs rootfs filesystem.squashfs -e boot
          mkdir -p iso/boot/grub
          cp filesystem.squashfs iso/
          sudo cp rootfs/boot/vmlinuz-* iso/vmlinuz
          sudo cp rootfs/boot/initrd.img-* iso/initrd.img

          # اهم حاجة: EOF لازق في اول السطر مفيش مسافة قبله
          echo 'set timeout=5
          set default=0
          set menu_color_normal=white/black
          set menu_color_highlight=black/light-gray
          
          menuentry "برمجة عبد الله و عبد الرحمن هاني [KSO] - V34.FINAL16" {
            linux /vmlinuz boot=live toram quiet splash
            initrd /initrd.img
          }' | sudo tee iso/boot/grub/grub.cfg > /dev/null

          sudo grub-mkrescue -o KSO-HANI-V34-FINAL16.iso iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KSO-HANI-V34-FINAL16.iso
          path: KSO-HANI-V34-FINAL16.iso
